server:
  port: 8087

spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/ORCLCDB}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

logging:
  level:
    com.example.empsapiv1: INFO
