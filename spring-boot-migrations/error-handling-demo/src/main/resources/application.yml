server:
  port: 8095

spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/ORCLCDB}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:32768}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}

logging:
  level:
    com.example.errorhandlingdemo: INFO
