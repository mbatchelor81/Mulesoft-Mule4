server:
  port: 8091

spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/ORCLCDB}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update

ftp:
  host: ${FTP_HOST:localhost}
  port: ${FTP_PORT:21}
  username: ${FTP_USERNAME:ftpuser}
  password: ${FTP_PASSWORD:ftpuser}
  remote-file: ${FTP_REMOTE_FILE:EmployeeDBData.xlsx}

logging:
  level:
    com.example.databasetoftpexcel: INFO
