spring:
  cloud:
    azure:
      active-directory:
        enabled: true
        credential:
          client-id: ${AZURE_AD_CLIENT_ID:your-client-id}
          client-secret: ${AZURE_AD_CLIENT_SECRET:your-client-secret}
        profile:
          tenant-id: ${AZURE_AD_TENANT_ID:your-tenant-id}
        app-id-uri: ${AZURE_AD_APP_ID_URI:api://your-app-id}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/${AZURE_AD_TENANT_ID:your-tenant-id}/v2.0
